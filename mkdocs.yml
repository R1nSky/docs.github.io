site_name: Wiki Rinsky
site_url: https://r1nsky.github.io/docs.github.io/

theme:
  name: material
  language: pt-BR

  palette:
    # Modo escuro (roxo)
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Modo Escuro

    # Modo claro (roxo)
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Modo Claro

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - toc.follow

  icon:
    logo: material/minecraft
    repo: fontawesome/brands/github


nav:
  - 🏠 Início: index.md
  - 📚 Plugins:
    - Plugin Clãs: plugins/simpleclans/index.md
    - Plugin Slime Fun: plugins/smilefun/index.md
    - Plugin McMMO: plugins/mcmmo/index.md
  - ⚖️ Regras do Servidor: regras.md


markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
